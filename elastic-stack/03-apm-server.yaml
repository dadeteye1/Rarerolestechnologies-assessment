apiVersion: v1
kind: ConfigMap
metadata:
  name: apm-server-config
  namespace: elastic-stack
data:
  apm-server.yml: |
    apm-server:
      host: 0.0.0.0:8200
      rum:
        enabled: true
        allow_origins: ["*"]
      auth:
        secret_token: "${ELASTIC_APM_SECRET_TOKEN}"
      otlp:
        enabled: true
        grpc:
          enabled: true
          host: 0.0.0.0:8200
        http:
          enabled: true
          host: 0.0.0.0:8200
    output.elasticsearch:
      hosts: ["http://elasticsearch.elastic-stack:9200"]
      username: "elastic"
      password: "${ELASTIC_PASSWORD}"
    setup.kibana:
      host: "http://kibana.elastic-stack:5601"
---
apiVersion: v1
kind: Service
metadata:
  name: apm-server
  namespace: elastic-stack
spec:
  ports:
    - name: apm
      port: 8200
      targetPort: 8200
  selector:
    app: apm-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apm-server
  namespace: elastic-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apm-server
  template:
    metadata:
      labels:
        app: apm-server
    spec:
      containers:
        - name: apm-server
          image: docker.elastic.co/apm/apm-server:8.13.4
          env:
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elastic-credentials
                  key: elastic_password
            - name: ELASTIC_APM_SECRET_TOKEN
              valueFrom:
                secretKeyRef:
                  name: elastic-credentials
                  key: apm_secret_token
          ports:
            - containerPort: 8200
          volumeMounts:
            - name: apm-config
              mountPath: /usr/share/apm-server/apm-server.yml
              subPath: apm-server.yml
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
      volumes:
        - name: apm-config
          configMap:
            name: apm-server-config
