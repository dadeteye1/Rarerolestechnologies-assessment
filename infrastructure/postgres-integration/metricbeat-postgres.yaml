apiVersion: v1
kind: ConfigMap
metadata:
  name: metricbeat-postgres-config
  namespace: elastic-stack
data:
  metricbeat.yml: |
    metricbeat.modules:
      - module: postgresql
        metricsets: ["database", "bgwriter", "activity", "statement"]
        period: 10s
        hosts: ["postgres.default:5432"]
        username: "${POSTGRES_USER}"
        password: "${POSTGRES_PASSWORD}"
    output.elasticsearch:
      hosts: ["http://elasticsearch.elastic-stack:9200"]
      username: "elastic"
      password: "${ELASTIC_PASSWORD}"
    setup.kibana:
      host: "http://kibana.elastic-stack:5601"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metricbeat-postgres
  namespace: elastic-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metricbeat-postgres
  template:
    metadata:
      labels:
        app: metricbeat-postgres
    spec:
      containers:
        - name: metricbeat
          image: docker.elastic.co/beats/metricbeat:8.13.4
          args: ["-c", "/etc/metricbeat.yml", "-e"]
          env:
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elastic-credentials
                  key: elastic_password
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
          volumeMounts:
            - name: config
              mountPath: /etc/metricbeat.yml
              subPath: metricbeat.yml
      volumes:
        - name: config
          configMap:
            name: metricbeat-postgres-config
