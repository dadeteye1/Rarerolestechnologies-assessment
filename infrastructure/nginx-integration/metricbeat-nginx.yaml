apiVersion: v1
kind: ConfigMap
metadata:
  name: metricbeat-nginx-config
  namespace: elastic-stack
data:
  metricbeat.yml: |
    metricbeat.modules:
      - module: prometheus
        metricsets: ["collector"]
        period: 10s
        hosts: ["ingress-nginx-controller-metrics.ingress-nginx.svc:10254"]
        metrics_path: /metrics
    output.elasticsearch:
      hosts: ["http://elasticsearch.elastic-stack:9200"]
      username: "elastic"
      password: "${ELASTIC_PASSWORD}"
    setup.kibana:
      host: "http://kibana.elastic-stack:5601"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metricbeat-nginx
  namespace: elastic-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metricbeat-nginx
  template:
    metadata:
      labels:
        app: metricbeat-nginx
    spec:
      containers:
        - name: metricbeat
          image: docker.elastic.co/beats/metricbeat:8.13.4
          args: ["-c", "/etc/metricbeat.yml", "-e"]
          env:
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elastic-credentials
                  key: elastic_password
          volumeMounts:
            - name: config
              mountPath: /etc/metricbeat.yml
              subPath: metricbeat.yml
      volumes:
        - name: config
          configMap:
            name: metricbeat-nginx-config
